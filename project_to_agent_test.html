<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    /* 加载提示样式 */
    #loading-overlay {
      display: none;
    }

    #loading-overlay.hidden {
      display: none;
    }
  </style>
</head>
<body>


<script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.20/libs/cn/index.js"></script>
<script>
  const memberId = document.cookie.split('; ').find(row => row.startsWith('avatarImageUrl='))?.split('=')[1]?.trim() || '';
  console.log(1222, memberId);
  function generateUniqueId() {
    return 'user_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
  }
  const connector_uid = generateUniqueId();
  async function fetchToken() {
    const response = await fetch('https://sd6rq7nhgrokt7kpcrjfg.apigateway-cn-beijing.volceapi.com/callback?sessionName='+connector_uid, {
      headers: {'X-Requested-With': 'XMLHttpRequest'}
    });
    if (!response.ok) {
      throw new Error(`获取 token 失败: ${response.status}`);
    }
    const data = await response.json();
    if (!data.access_token) {
      throw new Error('返回的数据中没有 access_token');
    }
    return data.access_token;
  }
  async function updateVariables(token, params) {
    const response = await fetch('https://sd6rq7nhgrokt7kpcrjfg.apigateway-cn-beijing.volceapi.com/update-variables', {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        token: token,
        params: params
      })
    });
    if (!response.ok) {
      throw new Error(`设置变量 失败: ${response.status}`);
    }
    return await response.json();
  }
  async function initChatSDK() {
    try {
      const token = await fetchToken();
      const bot_id = '7618132451860742196';
      const params = {
        "bot_id": bot_id,
        "connector_uid": connector_uid,
        "connector_id": "999",
        "data": [
          {
            "keyword": "memberId",
            "value": memberId
          }
        ]
      }
      setTimeout(() => {
        updateVariables(token, params);
      }, 300);
      const client = new CozeWebSDK.WebChatClient({
        config: {
          type: 'bot',
          bot_id: bot_id,
          isIframe: true,
        },
        auth: {
          type: 'token',
          token: token,
          onRefreshToken: fetchToken
        },
        userInfo: {
          id: connector_uid, // userInfo.id 的唯一值
          url: 'https://service-img.tos-cn-beijing.volces.com/logo.png',
          nickname: 'User'
        },
        ui: {
          base: {
            icon: 'https://service-img.tos-cn-beijing.volces.com/logo.png',
            layout: 'pc',
            lang: 'zh-CN',
            zIndex: 3000
          },
          header: {
            isShow: true,
            isNeedClose: true,
          },
          asstBtn: {
            isNeed: true
          },
          footer: {
            isShow: false,
            expressionText: 'Powered by 凡高',
          },
          chatBot: {
            title: '',
            uploadable: true,
            width: 600,
          },
          conversations: {
            isNeed: false
          },
        },
      });
    } catch (error) {
      console.log("初始化失败");
    }
  }
  initChatSDK();
</script>
<style>
  textarea[data-testid="bot.ide.chat_area.chat_input.textarea"] {
    border: none !important;
  }
</style>



</body>
</html>
