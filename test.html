<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    /* 加载提示样式 */
    #loading-overlay {
      display: none;
    }

    #loading-overlay.hidden {
      display: none;
    }
  </style>
</head>
<body>



<!--审核智能体开始-->
<script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.20/libs/cn/index.js"></script>
<script>
  function enablePasteImage() {
    document.addEventListener('paste', async (event) => {
      const items = event.clipboardData?.items;
      if (!items) return;

      // 查找剪贴板中的图片
      for (let i = 0; i < items.length; i++) {
        const item = items[i];

        if (item.type.indexOf('image') !== -1) {
          event.preventDefault();
          const file = item.getAsFile();
          if (!file) continue;
          // 查找输入框并触发文件选择
          // Coze SDK 的输入框通常有特定的类名或属性
          const fileInput = document.querySelector('.coze-chat-sdk-semi-upload-hidden-input-replace');
          if (fileInput) {
            // 创建 DataTransfer 对象来模拟文件选择
            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(file);
            fileInput.files = dataTransfer.files;
            // 触发 change 事件
            const changeEvent = new Event('change', {bubbles: true});
            fileInput.dispatchEvent(changeEvent);
            console.log('已粘贴图片:', file.name, file.type, file.size);
          } else {
            console.warn('未找到文件上传输入框，粘贴功能可能不可用');
          }
          break;
        }
      }
    });
    console.log('粘贴图片功能已启用');
  }
  async function fetchToken() {
    const response = await fetch('https://sd6rq7nhgrokt7kpcrjfg.apigateway-cn-beijing.volceapi.com/callback', {
      headers: {'X-Requested-With': 'XMLHttpRequest'}
    });
    if (!response.ok) {
      throw new Error(`获取 token 失败: ${response.status}`);
    }
    const data = await response.json();
    if (!data.access_token) {
      throw new Error('返回的数据中没有 access_token');
    }
    return data.access_token;
  }
  async function initChatSDK() {
    try {
      const initialToken = await fetchToken();
      const client = new CozeWebSDK.WebChatClient({
        config: {
          type: 'bot',
          bot_id: '7614433069122224128',
        },
        auth: {
          type: 'token',
          token: initialToken,
          onRefreshToken: fetchToken
        },
        // 使用固定的 user_id 保持会话一致性
        userInfo: {
          id: 'jwt_oauth_user',
          url: 'https://service-img.tos-cn-beijing.volces.com/logo.png',
          nickname: 'User'
        },
        ui: {
          base: {
            icon: 'https://service-img.tos-cn-beijing.volces.com/logo.png',
            layout: 'pc',
            lang: 'zh-CN',
            zIndex: 3000
          },
          header: {
            isShow: true,
            isNeedClose: true,
          },
          asstBtn: {
            isNeed: true
          },
          footer: {
            isShow: false,
            expressionText: 'Powered by 凡高',
          },
          chatBot: {
            title: 'AI辅助决策审批助手',
            uploadable: true,
            width: 600,
          },
          conversations: {
            isNeed: false
          },
        },
      });
      // 启用粘贴图片功能
      enablePasteImage();
    } catch (error) {
      console.log("初始化失败");
    }
  }
  initChatSDK();
</script>
<style>
  textarea[data-testid="bot.ide.chat_area.chat_input.textarea"] {
    border: none!important;
  }
</style>
<!--审核智能体结束-->


</body>
</html>
